<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Susut Listrik{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-brand" id="brand-text">
                    <span class="sidebar-brand-icon">⚡</span>
                    <span class="sidebar-brand-text">
                        <span class="brand-name">SusutGuard</span>
                        <span class="brand-sub">Monitoring</span>
                    </span>
                </span>
                <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <span class="nav-group-label">Utama</span>
                
                <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    </span>
                    <span class="nav-text">Dashboard</span>
                </a>
                
                <a href="{{ url_for('halaman_penyulang') }}" class="nav-item {% if request.path == '/penyulang' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </span>
                    <span class="nav-text">Penyulang</span>
                </a>
                
                <a href="#" class="nav-item">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </span>
                    <span class="nav-text">Laporan</span>
                </a>

                <span class="nav-group-label" style="margin-top: 15px;">Pengaturan</span>
                <button id="dark-mode-toggle" class="nav-item" style="background: transparent; border: none; width: 100%; text-align: left; cursor: pointer; color: inherit;">
                    <span class="nav-icon" id="dark-mode-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </span>
                    <span class="nav-text" id="dark-mode-text">Mode Gelap</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-footer-info">
                    <span class="sidebar-footer-dot"></span>
                    <span class="sidebar-footer-text">Sistem Aktif</span>
                </div>
            </div>
        </aside>
        <main class="main-content" id="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            const sidebarToggle = document.getElementById("sidebar-toggle");
            
            // Elemen Dark Mode
            const darkModeToggle = document.getElementById("dark-mode-toggle");
            const darkModeIcon = document.getElementById("dark-mode-icon");
            const darkModeText = document.getElementById("dark-mode-text");

            // ═══════════════════════════════════════
            // 1. LOGIKA UTAMA SIDEBAR INITIALIZATION
            // ═══════════════════════════════════════
            const isCollapsed = localStorage.getItem("sidebar-collapsed") === "true";
            sidebar.classList.add("no-transition");
            if (mainContent) mainContent.classList.add("no-transition");

            if (isCollapsed) {
                sidebar.classList.add("collapsed");
                if (mainContent) mainContent.classList.add("collapsed");
            } else {
                sidebar.classList.remove("collapsed");
                if (mainContent) mainContent.classList.remove("collapsed");
            }

            setTimeout(function() {
                sidebar.classList.remove("no-transition");
                if (mainContent) mainContent.classList.remove("no-transition");
            }, 50);

            // ═══════════════════════════════════════
            // 2. LOGIKA UTAMA INITIALIZATION DARK MODE
            // ═══════════════════════════════════════
            const isDarkModeActive = localStorage.getItem("dark-mode") === "true";
            
            function updateDarkModeUI(active) {
                if (active) {
                    document.body.classList.add("dark");
                    if (darkModeText) darkModeText.textContent = "Mode Terang";
                    if (darkModeIcon) {
                        darkModeIcon.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
                    }
                } else {
                    document.body.classList.remove("dark");
                    if (darkModeText) darkModeText.textContent = "Mode Gelap";
                    if (darkModeIcon) {
                        darkModeIcon.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
                    }
                }
                
                // Re-render chart agar skema warna grid/font Plotly berubah mengikuti mode
                if (typeof triggerChartResize === "function") {
                    triggerChartResize();
                } else if (typeof Plotly !== 'undefined') {
                    // Jika di halaman dashboard, panggil fungsi update theme bawaan dashboard.js jika ada
                    window.dispatchEvent(new Event('resize'));
                }
            }

            // Terapkan state dark mode saat load awal halaman
            updateDarkModeUI(isDarkModeActive);

            // Event listener saat tombol dark mode diklik
            if (darkModeToggle) {
                darkModeToggle.addEventListener("click", function() {
                    const currentDarkStatus = document.body.classList.contains("dark");
                    const newDarkStatus = !currentDarkStatus;
                    localStorage.setItem("dark-mode", newDarkStatus);
                    updateDarkModeUI(newDarkStatus);
                    
                    // Jika fungsi reloadData dari dashboard.js atau penyulang.js ada, panggil untuk memperbarui warna chart
                    if (typeof loadData === "function") {
                        loadData();
                    }
                });
            }

            // ═══════════════════════════════════════
            // 3. EVENT RESIZE GRAFIK (PLOTLY)
            // ═══════════════════════════════════════
            function triggerChartResize() {
                const plotlyCharts = document.querySelectorAll('.js-plotly-plot');
                plotlyCharts.forEach(chart => {
                    if (typeof Plotly !== 'undefined') {
                        // Update layout dinamis sebelum resize jika fungsi theme tersedia
                        if (typeof chartTheme === 'function') {
                            const t = chartTheme();
                            Plotly.relayout(chart, {
                                paper_bgcolor: t.paper,
                                plot_bgcolor:  t.plot,
                                font:          { color: t.font },
                                xaxis:         { gridcolor: t.grid, zerolinecolor: t.grid, color: t.font },
                                yaxis:         { gridcolor: t.grid, zerolinecolor: t.grid, color: t.font }
                            });
                        }
                        Plotly.Plots.resize(chart);
                    }
                });
                window.dispatchEvent(new Event('resize'));
            }

            // Action click toggle sidebar
            sidebarToggle.addEventListener("click", function() {
                sidebar.classList.toggle("collapsed");
                if (mainContent) mainContent.classList.toggle("collapsed");

                const currentStatus = sidebar.classList.contains("collapsed");
                localStorage.setItem("sidebar-collapsed", currentStatus);

                triggerChartResize();
                setTimeout(triggerChartResize, 100);
            });
        });
    </script>
</body>
</html>
