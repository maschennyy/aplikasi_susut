<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Susut Listrik{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-brand" id="brand-text">
                    <span class="sidebar-brand-icon">⚡</span>
                    <span class="sidebar-brand-text">
                        <span class="brand-name">SusutGuard</span>
                        <span class="brand-sub">Monitoring</span>
                    </span>
                </span>
                <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <span class="nav-group-label">Utama</span>
                
                <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    </span>
                    <span class="nav-text">Dashboard</span>
                </a>
                
                <a href="{{ url_for('halaman_penyulang') }}" class="nav-item {% if request.path == '/penyulang' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </span>
                    <span class="nav-text">Penyulang</span>
                </a>
                
                <a href="#" class="nav-item">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </span>
                    <span class="nav-text">Laporan</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-footer-info">
                    <span class="sidebar-footer-dot"></span>
                    <span class="sidebar-footer-text">Sistem Aktif</span>
                </div>
            </div>
        </aside>
        <main class="main-content" id="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            const sidebarToggle = document.getElementById("sidebar-toggle");

            // 1. Ambil status terakhir dari localStorage
            const isCollapsed = localStorage.getItem("sidebar-collapsed") === "true";

            // Set awal tanpa animasi kedip
            sidebar.classList.add("no-transition");
            if (isCollapsed) {
                sidebar.classList.add("collapsed");
                if (mainContent) mainContent.classList.add("collapsed");
            } else {
                sidebar.classList.remove("collapsed");
                if (mainContent) mainContent.classList.remove("collapsed");
            }

            setTimeout(function() {
                sidebar.classList.remove("no-transition");
            }, 50);

            // Fungsi trigger resize grafik sekali jalan
            function triggerChartResize() {
                const plotlyCharts = document.querySelectorAll('.js-plotly-plot');
                plotlyCharts.forEach(chart => {
                    if (typeof Plotly !== 'undefined') {
                        Plotly.Plots.resize(chart);
                    }
                });
                window.dispatchEvent(new Event('resize'));
            }

            // 2. Logika ketika tombol garis 3 diklik
            sidebarToggle.addEventListener("click", function() {
                sidebar.classList.toggle("collapsed");
                if (mainContent) mainContent.classList.toggle("collapsed");

                // Simpan status terbaru ke localStorage
                const currentStatus = sidebar.classList.contains("collapsed");
                localStorage.setItem("sidebar-collapsed", currentStatus);

                // Eksekusi resize langsung saat itu juga karena layout main-content sudah instan berubah
                triggerChartResize();
                
                // Opsional: jalankan sekali lagi setelah 100ms untuk memastikan kestabilan render canvas
                setTimeout(triggerChartResize, 100);
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
