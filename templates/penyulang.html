{% extends "base.html" %}
{% block title %}{{ judul }} – Susut Energi{% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-eyebrow">{{ eyebrow }}</div>
      <h1 class="page-title">{{ judul }}</h1>
    </div>
  </div>

  <div class="coming-soon-wrap">
    <div class="cs-icon">
      <i class="ti ti-{{ icon }}" aria-hidden="true"></i>
    </div>
    <h2 class="cs-title">Halaman Sedang Dikembangkan</h2>
    <p class="cs-desc">
      {{ desc }}<br>
      Halaman ini akan tersedia pada sesi pengembangan berikutnya.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn-outline" style="margin-top:16px;display:inline-flex">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
      Kembali ke Dashboard
    </a>
  </div>
</div>
{% endblock %}
